name: AinkradLeyline
options:
  bundleIdPrefix: com.ainkrad
  deploymentTarget: { macOS: "14.0" }
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    EAGER_LINKING: NO
packages:
  AinkradAppKit:
    url: https://github.com/AhmedMElhalaby/AinkradAppKit
    revision: bbad66a43c414d0e9c22e193ba3d326fb5d23532
targets:
  LeylineFeature:
    type: library.static
    platform: macOS
    sources: [Sources/LeylineFeature]
    dependencies:
      - package: AinkradAppKit
        embed: false
  LeylinePlugin:
    type: bundle
    platform: macOS
    sources: [Sources/LeylinePlugin]
    dependencies:
      - target: LeylineFeature
      - package: AinkradAppKit
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ainkrad.plugin.leyline
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/LeylinePlugin/Info.plist
        MACH_O_TYPE: mh_bundle
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        OTHER_LDFLAGS: ["-lLeylineFeature"]
  LeylineFeatureTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/LeylineFeatureTests]
    dependencies:
      - target: LeylineFeature
      - package: AinkradAppKit
schemes:
  LeylinePlugin:
    build: { targets: { LeylinePlugin: all, LeylineFeatureTests: [test] } }
    test:  { config: Debug, targets: [LeylineFeatureTests] }
